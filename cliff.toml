[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
Generated automatically from Git history using [git-cliff](https://git-cliff.org/).
Versions follow [Semantic Versioning](https://semver.org/).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {{ commit.message | upper_first | trim_end_matches(pat=".") }}\
{% if commit.breaking %} ⚠ BREAKING{% endif %}

{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs", group = "Documentation" },
  { message = "^build|^ci", group = "Build & CI" },
  { message = "^chore\\(deps\\)", skip = true },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", group = "Maintenance" },
  { message = "^test|^style", skip = true },
  { message = "^Merge|^merge|^revert: merge", skip = true },
  { message = "^docs: update badge", skip = true },
]
filter_commits = true
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
protect_breaking_commits = false
