name: Security

on:
  schedule:
    - cron: "0 8 * * 1"   # every Monday at 08:00 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  # ─── Go static security analysis ────────────────────────────────────────────
  gosec:
    name: Go Security Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [shared, server, agent]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Download agent deps (restic + rclone) for agent module
        if: matrix.module == 'agent'
        run: cd agent && go run ./scripts/download_deps.go

      - name: Run gosec on ${{ matrix.module }}
        uses: securego/gosec@master
        with:
          args: ./${{ matrix.module }}/...

  # ─── Container vulnerability scan ───────────────────────────────────────────
  trivy:
    name: Container Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download agent deps (restic + rclone)
        run: cd agent && go run ./scripts/download_deps.go

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Dockerfile
          tags: arkeep-server:scan
          load: true
          push: false

      - name: Build agent image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: agent/Dockerfile
          tags: arkeep-agent:scan
          load: true
          push: false

      - name: Scan server image
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: arkeep-server:scan
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Scan agent image
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: arkeep-agent:scan
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH