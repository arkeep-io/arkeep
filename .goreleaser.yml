# .goreleaser.yml
#
# GoReleaser configuration for Arkeep.
# Triggered automatically by the release.yml GitHub Actions workflow on tag push.
#
# To test locally (dry run, no publish):
#   goreleaser release --snapshot --clean
#
# Reference: https://goreleaser.com/customization/

version: 2

project_name: arkeep

# ─── Build metadata ───────────────────────────────────────────────────────────

before:
  hooks:
    # Build the GUI and embed it into the server before compiling Go binaries.
    # The server embeds the GUI dist/ directory via go:embed at build time.
    - sh -c "cd gui && pnpm install --frozen-lockfile && pnpm build"

    # Download restic and rclone binaries for all supported platforms.
    # These are embedded into the agent binary via go:embed.
    - sh -c "cd agent && go run ./scripts/download_deps.go --all-platforms"

# ─── Binaries ─────────────────────────────────────────────────────────────────

builds:
  # Server — Linux and macOS only (no production use case for Windows server)
  - id: server
    binary: arkeep-server
    main: ./cmd/server
    dir: server
    env:
      - CGO_ENABLED=0
      - GOWORK=off
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  # Agent — Linux, macOS, and Windows (agents run on any machine being backed up)
  - id: agent
    binary: arkeep-agent
    main: ./cmd/agent
    dir: agent
    env:
      - CGO_ENABLED=0
      - GOWORK=off
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Windows arm64 is excluded — restic does not ship a windows/arm64 binary,
    # so the embedded binary would be missing for that combination.
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

# ─── Archives ─────────────────────────────────────────────────────────────────

archives:
  - id: server
    ids: [server]
    name_template: "arkeep-server_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md

  - id: agent
    ids: [agent]
    name_template: "arkeep-agent_{{ .Os }}_{{ .Arch }}"
    # Windows users expect .zip, everyone else gets .tar.gz
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - deploy/systemd/arkeep-agent.service

# ─── Checksums ────────────────────────────────────────────────────────────────

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# ─── Docker images ────────────────────────────────────────────────────────────
# dockers_v2 is the current API — builds multi-arch images directly via buildx
# without needing separate per-arch entries and a docker_manifests section.

dockers_v2:
  - id: server
    ids: [server]
    image_templates:
      - "ghcr.io/arkeep-io/arkeep-server:{{ .Tag }}"
      - "ghcr.io/arkeep-io/arkeep-server:latest"
      - "docker.io/arkeepio/arkeep-server:{{ .Tag }}"
      - "docker.io/arkeepio/arkeep-server:latest"
    dockerfile: server/Dockerfile.goreleaser
    use: buildx
    goarch: [amd64, arm64]
    goos: linux
    build_flag_templates:
      - "--label=org.opencontainers.image.title=arkeep-server"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/arkeep-io/arkeep"
      - "--label=org.opencontainers.image.licenses=AGPL-3.0"

  - id: agent
    ids: [agent]
    image_templates:
      - "ghcr.io/arkeep-io/arkeep-agent:{{ .Tag }}"
      - "ghcr.io/arkeep-io/arkeep-agent:latest"
      - "docker.io/arkeepio/arkeep-agent:{{ .Tag }}"
      - "docker.io/arkeepio/arkeep-agent:latest"
    dockerfile: agent/Dockerfile.goreleaser
    use: buildx
    goarch: [amd64, arm64]
    goos: linux
    build_flag_templates:
      - "--label=org.opencontainers.image.title=arkeep-agent"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/arkeep-io/arkeep"
      - "--label=org.opencontainers.image.licenses=AGPL-3.0"

# ─── Release notes ────────────────────────────────────────────────────────────

changelog:
  use: github
  sort: asc
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Performance Improvements"
      regexp: "^perf"
      order: 2
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "^refactor:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: arkeep-io
    name: arkeep
  # Mark pre-v1.0 releases as pre-release automatically
  prerelease: auto
  footer: |
    ## Docker Images

    ```bash
    # Server
    docker pull ghcr.io/arkeep-io/arkeep-server:{{ .Tag }}

    # Agent
    docker pull ghcr.io/arkeep-io/arkeep-agent:{{ .Tag }}
    ```

    ## Verify Checksums

    ```bash
    sha256sum --check checksums.txt
    ```