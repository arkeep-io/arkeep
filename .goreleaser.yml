version: 2

project_name: arkeep

before:
  hooks:
    - sh -c "cd gui && pnpm install --frozen-lockfile && pnpm build"
    - sh -c "mkdir -p server/cmd/server/dist && cp -r gui/dist/. server/cmd/server/dist"
    - sh -c "cd agent && go run ./scripts/download_deps.go --all-platforms"

builds:
  - id: server
    binary: arkeep-server
    main: ./cmd/server
    dir: server
    env:
      - CGO_ENABLED=0
      - GOWORK=off
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: agent
    binary: arkeep-agent
    main: ./cmd/agent
    dir: agent
    env:
      - CGO_ENABLED=0
      - GOWORK=off
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: server
    ids: [server]
    name_template: "arkeep-server_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md

  - id: agent
    ids: [agent]
    name_template: "arkeep-agent_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - deploy/systemd/arkeep-agent.service

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

dockers:
  - id: server-amd64
    ids: [server]
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/arkeep-io/arkeep-server:{{ .Tag }}-amd64"
      - "docker.io/arkeepio/arkeep-server:{{ .Tag }}-amd64"
    dockerfile: server/Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=arkeep-server"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/arkeep-io/arkeep"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

  - id: server-arm64
    ids: [server]
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/arkeep-io/arkeep-server:{{ .Tag }}-arm64"
      - "docker.io/arkeepio/arkeep-server:{{ .Tag }}-arm64"
    dockerfile: server/Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=arkeep-server"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/arkeep-io/arkeep"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

  - id: agent-amd64
    ids: [agent]
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/arkeep-io/arkeep-agent:{{ .Tag }}-amd64"
      - "docker.io/arkeepio/arkeep-agent:{{ .Tag }}-amd64"
    dockerfile: agent/Dockerfile.goreleaser
    extra_files:
      - agent/entrypoint.sh
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=arkeep-agent"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/arkeep-io/arkeep"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

  - id: agent-arm64
    ids: [agent]
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/arkeep-io/arkeep-agent:{{ .Tag }}-arm64"
      - "docker.io/arkeepio/arkeep-agent:{{ .Tag }}-arm64"
    dockerfile: agent/Dockerfile.goreleaser
    extra_files:
      - agent/entrypoint.sh
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=arkeep-agent"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/arkeep-io/arkeep"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

docker_manifests:
  - name_template: "ghcr.io/arkeep-io/arkeep-server:{{ .Tag }}"
    image_templates:
      - "ghcr.io/arkeep-io/arkeep-server:{{ .Tag }}-amd64"
      - "ghcr.io/arkeep-io/arkeep-server:{{ .Tag }}-arm64"

  - name_template: "ghcr.io/arkeep-io/arkeep-server:latest"
    image_templates:
      - "ghcr.io/arkeep-io/arkeep-server:{{ .Tag }}-amd64"
      - "ghcr.io/arkeep-io/arkeep-server:{{ .Tag }}-arm64"

  - name_template: "docker.io/arkeepio/arkeep-server:{{ .Tag }}"
    image_templates:
      - "docker.io/arkeepio/arkeep-server:{{ .Tag }}-amd64"
      - "docker.io/arkeepio/arkeep-server:{{ .Tag }}-arm64"

  - name_template: "docker.io/arkeepio/arkeep-server:latest"
    image_templates:
      - "docker.io/arkeepio/arkeep-server:{{ .Tag }}-amd64"
      - "docker.io/arkeepio/arkeep-server:{{ .Tag }}-arm64"

  - name_template: "ghcr.io/arkeep-io/arkeep-agent:{{ .Tag }}"
    image_templates:
      - "ghcr.io/arkeep-io/arkeep-agent:{{ .Tag }}-amd64"
      - "ghcr.io/arkeep-io/arkeep-agent:{{ .Tag }}-arm64"

  - name_template: "ghcr.io/arkeep-io/arkeep-agent:latest"
    image_templates:
      - "ghcr.io/arkeep-io/arkeep-agent:{{ .Tag }}-amd64"
      - "ghcr.io/arkeep-io/arkeep-agent:{{ .Tag }}-arm64"

  - name_template: "docker.io/arkeepio/arkeep-agent:{{ .Tag }}"
    image_templates:
      - "docker.io/arkeepio/arkeep-agent:{{ .Tag }}-amd64"
      - "docker.io/arkeepio/arkeep-agent:{{ .Tag }}-arm64"

  - name_template: "docker.io/arkeepio/arkeep-agent:latest"
    image_templates:
      - "docker.io/arkeepio/arkeep-agent:{{ .Tag }}-amd64"
      - "docker.io/arkeepio/arkeep-agent:{{ .Tag }}-arm64"

changelog:
  use: git
  sort: asc
  abbrev: 0
  format: "- {{ .SHA }} {{ .Message }}"
  groups:
    - title: "Breaking Changes"
      regexp: '^.*![:(]|^BREAKING CHANGE:'
      order: 0
    - title: "Features"
      regexp: '^feat(\(.+\))?:'
      order: 1
    - title: "Bug Fixes"
      regexp: '^fix(\(.+\))?:'
      order: 2
    - title: "Performance"
      regexp: '^perf(\(.+\))?:'
      order: 3
    - title: "Build & CI"
      regexp: '^(build|ci)(\(.+\))?:'
      order: 4
    - title: "Maintenance"
      regexp: '^(refactor|chore)(\(.+\))?:'
      order: 5
    - title: "Docs"
      regexp: '^docs(\(.+\))?:'
      order: 6
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - '^test(\(.+\))?:'
      - '^style(\(.+\))?:'
      - '^Merge pull request'
      - '^Merge branch'
      - '^merge '
      - '^revert: merge '
      - '^docs: update badge'
      - '^chore\(deps\):'
      - '^chore\(release\):'

release:
  github:
    owner: arkeep-io
    name: arkeep
  prerelease: auto
  header: |
    ## Release Summary

    **Version:** {{ .Tag }}
    **Commit:** {{ .Commit }}
    **Built at:** {{ .Date }}

    ### Included deliverables
    - arkeep-server binaries for Linux and macOS
    - arkeep-agent binaries for Linux, macOS and Windows
    - multi-arch Docker images for server and agent
    - SHA256 checksums for all release artifacts

    ### Change log policy
    The technical changelog below is generated from Git history using Conventional Commits.
    For pull-request-oriented notes and contributor rollup, use GitHub generated release notes configured in `.github/release.yml`.

    ---

    ## Technical Changelog

  footer: |
    ---

    ## Docker Images

    ```bash
    # Server
    docker pull ghcr.io/arkeep-io/arkeep-server:{{ .Tag }}

    # Agent
    docker pull ghcr.io/arkeep-io/arkeep-agent:{{ .Tag }}
    ```

    ## Verify Checksums

    ```bash
    sha256sum --check checksums.txt
    ```