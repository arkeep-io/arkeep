<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Arkeep</title>
    <meta name="description" content="Centralized backup management for self-hosted infrastructure. Schedule, monitor, and manage backups across all your servers from a single dashboard." />
    <meta name="application-name" content="Arkeep" />

    <!-- Prevent search engines from indexing self-hosted instances -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- Theme color for browser chrome (matches Arkeep's dark sidebar) -->
    <meta name="theme-color" content="#09090b" />

    <!-- Open Graph — used when sharing links in Slack, Notion, etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Arkeep" />
    <meta property="og:description" content="Centralized backup management for self-hosted infrastructure." />
    <meta property="og:image" content="/og-image.png" />

    <!-- PWA manifest (generated by vite-plugin-pwa) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
