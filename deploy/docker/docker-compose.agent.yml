# deploy/docker/docker-compose.agent.yml — Agent-only deployment
#
# Use this on a machine you want to back up. The agent connects outbound
# to the Arkeep server via gRPC — no inbound ports are required.
#
# Quick start:
#   cd deploy/docker
#   cp .env.example .env   # set ARKEEP_SERVER_ADDR and ARKEEP_AGENT_SECRET
#   docker compose -f docker-compose.agent.yml up -d

services:
  agent:
    image: ghcr.io/arkeep-io/arkeep-agent:latest
    container_name: arkeep-agent
    restart: unless-stopped
    environment:
      # gRPC address — must be host:port only, e.g. arkeep.example.com:9090
      # Do NOT include a scheme (https:// etc.) — gRPC resolves the host directly.
      ARKEEP_SERVER_ADDR: "${ARKEEP_SERVER_ADDR:?ARKEEP_SERVER_ADDR is required — gRPC address, e.g. arkeep.example.com:9090}"
      ARKEEP_AGENT_SECRET: "${ARKEEP_AGENT_SECRET:?ARKEEP_AGENT_SECRET is required — must match the server}"
      # Required when the server's HTTP API is behind a reverse proxy (Traefik etc.).
      # Set to the public HTTPS URL, e.g. https://arkeep.example.com
      # Leave empty if port 8080 is exposed directly on the server host.
      ARKEEP_SERVER_HTTP_ADDR: "${ARKEEP_SERVER_HTTP_ADDR:-}"
      ARKEEP_STATE_DIR: "/var/lib/arkeep-agent"
      ARKEEP_LOG_LEVEL: "${ARKEEP_LOG_LEVEL:-info}"
      TZ: "${TZ:-UTC}"
      # ── Local backup destinations ────────────────────────────────────────────
      # The agent auto-detects Docker and uses the /hostfs mount below for path
      # translation — no env var required. Override only for custom mount points:
      #   ARKEEP_DOCKER_HOST_ROOT: "/custom-mountpoint"
      # ── PUID / PGID (optional) ───────────────────────────────────────────────
      # Uncomment when writing to host directories via the hostfs mount and the
      # agent does not have write permission as root.
      #   PUID: "${PUID:-}"
      #   PGID: "${PGID:-}"
      # ── gRPC TLS ───────────────────────────────────────────────────────────────
      # Auto-enrollment (default): on first startup the agent calls the server's
      # HTTP API to obtain a signed client certificate. The CA and client cert are
      # stored in ARKEEP_STATE_DIR and reused on every subsequent startup.
      #
      # The enrollment address is derived from ARKEEP_SERVER_ADDR by replacing
      # the port with 8080 and using plain HTTP. Override it when the server's
      # HTTP API is on a different address — this is REQUIRED when the server is
      # behind a TLS-terminating reverse proxy (Traefik, Nginx, Caddy):
      #   ARKEEP_SERVER_HTTP_ADDR: "https://arkeep.example.com"
      # If port 8080 is exposed directly (no proxy), the default is sufficient:
      #   ARKEEP_SERVER_HTTP_ADDR: "http://arkeep.example.com:8080"
      #
      # Only needed when the server uses an external cert from a non-system CA:
      #   ARKEEP_GRPC_TLS_CA: "/etc/arkeep/tls/ca.crt"
      #
      # Disable TLS entirely (development / same-machine only — never in production):
      #   ARKEEP_GRPC_INSECURE: "true"
    volumes:
      - arkeep-agent-data:/var/lib/arkeep-agent
      # ── Host filesystem mount ─────────────────────────────────────────────────
      # Mounts the entire host filesystem so any path entered in the UI resolves
      # correctly. Use :ro for backup-only; change to :rw to also restore to local paths.
      - /:/hostfs:ro
      # Windows (Docker Desktop) — one entry per drive (replace the line above):
      #   - C:/:/hostfs/c:ro
      #   - D:/:/hostfs/d:ro
      # Uncomment to mount a custom CA certificate for self-signed server certs:
      # - /etc/arkeep/tls:/etc/arkeep/tls:ro
      # Docker socket — read-only, for automatic container and volume discovery.
      # Remove if you do not need Docker volume backups.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Docker volumes root — required to back up Docker named volumes.
      # The agent resolves volume paths via the Docker API (host paths), so the
      # same path must be accessible inside the container. Adjust if your Docker
      # data root differs from /var/lib/docker (check: docker info | grep "Docker Root Dir").
      #
      # :ro (default) — safe for backup; prevents accidental writes.
      #   In-place restore of Docker volumes is not supported with :ro.
      #   The agent will automatically skip Docker volume paths and log a warning.
      # :rw — required to restore Docker volumes in-place.
      #   Stop the affected containers before running an in-place restore.
      #   The agent will automatically skip volumes whose containers are still running.
      - /var/lib/docker/volumes:/var/lib/docker/volumes:ro
      # Mount the paths you want to back up as read-only.
      # The paths must match what you configure in backup policies in the GUI.
      # Examples:
      #   - /etc:/backup/etc:ro
      #   - /home:/backup/home:ro
      #   - /var/data:/backup/data:ro

volumes:
  arkeep-agent-data:
    driver: local