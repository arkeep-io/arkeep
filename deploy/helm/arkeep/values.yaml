# values.yaml — default configuration for the Arkeep Helm chart.
# Override any value with --set or a custom values file:
#   helm install arkeep arkeep/arkeep -f my-values.yaml

# ─── Image ────────────────────────────────────────────────────────────────────

image:
  repository: ghcr.io/arkeep-io/arkeep-server
  pullPolicy: IfNotPresent
  # Defaults to the chart's appVersion when empty.
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# ─── Replicas ─────────────────────────────────────────────────────────────────
# WARNING: SQLite supports only replicaCount: 1 (ReadWriteOnce PVC cannot be
# mounted by more than one pod simultaneously). Switch to config.dbDriver: postgres
# before increasing replicas.

replicaCount: 1

# ─── Server configuration ─────────────────────────────────────────────────────

config:
  # Log level: debug, info, warn, error
  logLevel: info

  # Database driver: sqlite or postgres.
  # Use "postgres" with postgresql.enabled=true or externalPostgresql configured.
  dbDriver: sqlite

  # Set Secure flag on auth cookies. Enable when serving over HTTPS (recommended
  # in production).
  secureCookies: true

  # HTTP and gRPC listen addresses inside the container.
  # Change only if you have a specific reason — the Service ports below must match.
  httpAddr: ":8080"
  grpcAddr: ":9090"

# ─── gRPC TLS ─────────────────────────────────────────────────────────────────
# Enables TLS on the gRPC port so agents can connect securely without a proxy.
#
# Provide the name of an existing TLS Secret (type: kubernetes.io/tls).
# The chart mounts tls.crt and tls.key from the secret into the pod and sets
# ARKEEP_GRPC_TLS_CERT / ARKEEP_GRPC_TLS_KEY accordingly.
#
# Create with cert-manager (recommended):
#   Add a Certificate resource pointing to your ClusterIssuer, then set
#   grpc.tls.existingSecret to the name of the resulting Secret.
#
# Create manually:
#   kubectl create secret tls arkeep-grpc-tls \
#     --cert=path/to/tls.crt --key=path/to/tls.key -n <namespace>
#
# Leave existingSecret empty to run gRPC without TLS inside the cluster
# (acceptable when agents connect through a TLS-terminating load balancer
# or a service mesh such as Istio/Linkerd).

grpc:
  tls:
    existingSecret: ""
    # Mount path inside the container for the TLS certificate files.
    mountPath: /etc/arkeep/tls

# ─── Secrets ──────────────────────────────────────────────────────────────────
#
# Option A (simple): provide values here — the chart creates a Secret.
# Option B (advanced): create a Secret yourself and reference it with existingSecret.
#
# The secret key is used for AES-256-GCM credential encryption. Once set it must
# never change — rotating it invalidates all stored destination credentials.
# Generate with: openssl rand -hex 32
#
# When existingSecret is set and config.dbDriver is "postgres", your Secret must
# also contain the key ARKEEP_DB_DSN with the full PostgreSQL DSN.

secret:
  # Reference an existing Secret instead of creating one.
  # The Secret must contain the keys: ARKEEP_SECRET_KEY, ARKEEP_AGENT_SECRET
  # and ARKEEP_DB_DSN (when config.dbDriver=postgres).
  existingSecret: ""

  # Used only when existingSecret is empty.
  secretKey: ""
  agentSecret: ""

# ─── Persistence ──────────────────────────────────────────────────────────────

persistence:
  enabled: true
  # Storage class — leave empty to use the cluster default.
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  # Mount path inside the container.
  mountPath: /var/lib/arkeep

# ─── Service ──────────────────────────────────────────────────────────────────

service:
  type: ClusterIP
  # HTTP port (GUI + REST API)
  httpPort: 8080
  # gRPC port (agents)
  grpcPort: 9090

# ─── Ingress ──────────────────────────────────────────────────────────────────

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: arkeep.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: arkeep-tls
  #    hosts:
  #      - arkeep.example.com

# ─── PostgreSQL (subchart) ────────────────────────────────────────────────────
# Deploys a PostgreSQL instance alongside Arkeep.
# Set config.dbDriver=postgres to use it.

postgresql:
  enabled: false
  auth:
    username: arkeep
    # Required when postgresql.enabled=true — generate with: openssl rand -hex 16
    password: ""
    database: arkeep
  primary:
    persistence:
      enabled: true
      size: 8Gi

# ─── External PostgreSQL ──────────────────────────────────────────────────────
# Used when postgresql.enabled=false and config.dbDriver=postgres.
# Format: postgres://user:password@host:5432/dbname?sslmode=require

externalPostgresql:
  # Full DSN. If set, takes precedence over the individual fields below.
  url: ""
  host: ""
  port: 5432
  database: arkeep
  username: arkeep
  password: ""
  sslMode: require

# ─── Resources ────────────────────────────────────────────────────────────────

resources: {}
  # Recommended starting point for production:
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  # limits:
  #   cpu: 500m
  #   memory: 512Mi

# ─── Probes ───────────────────────────────────────────────────────────────────

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

# ─── Pod configuration ────────────────────────────────────────────────────────

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

# ─── Service Account ──────────────────────────────────────────────────────────

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""
