{{/*
Secret is only created when existingSecret is not set.
When existingSecret is set, the user is responsible for creating a Secret with:
  - ARKEEP_SECRET_KEY
  - ARKEEP_AGENT_SECRET
  - ARKEEP_DB_DSN (required when config.dbDriver=postgres)
*/}}
{{- if not .Values.secret.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "arkeep.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "arkeep.labels" . | nindent 4 }}
type: Opaque
stringData:
  ARKEEP_SECRET_KEY: {{ required "secret.secretKey is required when not using existingSecret" .Values.secret.secretKey | quote }}
  ARKEEP_AGENT_SECRET: {{ .Values.secret.agentSecret | quote }}
  {{- if eq .Values.config.dbDriver "postgres" }}
  ARKEEP_DB_DSN: {{ include "arkeep.postgresDSN" . | quote }}
  {{- end }}
{{- end }}
